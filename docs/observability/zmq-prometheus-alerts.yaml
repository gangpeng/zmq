groups:
  - name: zmq-broker
    rules:
      - alert: ZMQHighApiErrorRatio
        expr: sum(rate(kafka_server_api_errors_total[5m])) / clamp_min(sum(rate(kafka_server_requests_total[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ broker API error ratio is above 5 percent.
          description: Error responses are sustained relative to total broker requests.

      - alert: ZMQHighRequestLatencyP99
        expr: histogram_quantile(0.99, sum(rate(kafka_server_request_latency_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ request p99 latency is above 1 second.
          description: Broker request handling latency is above the operational SLO.

      - alert: ZMQHighProduceLatencyP99
        expr: histogram_quantile(0.99, sum(rate(kafka_server_produce_latency_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ produce p99 latency is above 1 second.
          description: Produce acknowledgements are above the operational write-latency SLO.

      - alert: ZMQHighFetchLatencyP99
        expr: histogram_quantile(0.99, sum(rate(kafka_server_fetch_latency_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ fetch p99 latency is above 1 second.
          description: Fetch responses are above the operational read-latency SLO.

      - alert: ZMQNoActiveRaftLeader
        expr: max(raft_role) < 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: No ZMQ Raft node is reporting leader role.
          description: A KRaft quorum without a leader cannot safely commit controller metadata.

  - name: zmq-controller
    rules:
      - alert: ZMQNoActiveController
        expr: kafka_controller_kafkacontroller_activecontrollercount < 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: No ZMQ controller is reporting active-controller status.
          description: Controller failover or registration may be stalled.

      - alert: ZMQBrokerNotRunning
        expr: kafka_server_kafkaserver_brokerstate != 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: ZMQ broker state is not reporting running.
          description: KafkaServer BrokerState should remain RUNNING after startup completes.

      - alert: ZMQLowRequestHandlerIdle
        expr: kafka_server_kafkarequesthandlerpool_requesthandleravgidlepercent < 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ request handler idle ratio is low.
          description: Sustained low request-handler idle time indicates request saturation.

      - alert: ZMQLowNetworkProcessorIdle
        expr: kafka_network_socketserver_networkprocessoravgidlepercent < 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ network processor idle ratio is low.
          description: Sustained low network-processor idle time indicates network saturation.

      - alert: ZMQRequestChannelBacklog
        expr: kafka_network_requestchannel_requestqueuesize + kafka_network_requestchannel_responsequeuesize > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ request channel backlog is high.
          description: Request or response queues are accumulating faster than broker workers can drain them.

      - alert: ZMQOfflinePartitions
        expr: kafka_server_replicamanager_offlinepartitionscount > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: ZMQ replica manager reports offline partitions.
          description: Offline partitions can make Produce or Fetch unavailable.

      - alert: ZMQUnderReplicatedPartitions
        expr: kafka_server_replicamanager_underreplicatedpartitions > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ZMQ replica manager reports under-replicated partitions.
          description: Replication lag can reduce durability during broker failure.

      - alert: ZMQUnderMinIsrPartitions
        expr: kafka_server_replicamanager_underminisrpartitioncount > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: ZMQ replica manager reports partitions below min ISR.
          description: Produce with acks=all can fail and durability is degraded while partitions are below min ISR.

      - alert: ZMQPartitionReassignmentStuck
        expr: kafka_server_replicamanager_reassigningpartitions > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: ZMQ partition reassignment has been active for more than 30 minutes.
          description: Stuck reassignments can indicate balancer convergence or broker-routing issues.

      - alert: ZMQDelayedFetchPurgatoryBacklog
        expr: kafka_server_delayedoperationpurgatory_purgatorysize{delayed_operation="Fetch"} > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ delayed fetch purgatory backlog is high.
          description: A large delayed-fetch backlog can indicate fetch wait or response-drain regressions.

      - alert: ZMQOfflineLogDirectories
        expr: kafka_log_logmanager_offlinelogdirectorycount > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: ZMQ broker has offline log directories.
          description: Offline log directories typically indicate disk failures or filesystem errors.

      - alert: ZMQControllerOfflinePartitions
        expr: kafka_controller_kafkacontroller_offlinepartitionscount > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: ZMQ controller reports offline partitions.
          description: Offline partitions cannot accept produce or fetch traffic until the controller restores leadership.

      - alert: ZMQPreferredReplicaImbalance
        expr: kafka_controller_kafkacontroller_preferredreplicaimbalancecount > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: ZMQ has partitions whose leader is not the preferred replica.
          description: Sustained preferred-replica imbalance can lead to skewed broker load and rack-affinity regressions.

      - alert: ZMQFailedProduceRequests
        expr: rate(kafka_server_brokertopicmetrics_failedproducerequests_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ZMQ broker topic metrics report failed produce requests.
          description: Failed writes can indicate storage, fencing, authorization, or leader routing issues.

      - alert: ZMQFailedFetchRequests
        expr: rate(kafka_server_brokertopicmetrics_failedfetchrequests_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ZMQ broker topic metrics report failed fetch requests.
          description: Failed reads can indicate storage, fencing, authorization, or leader routing issues.

      - alert: ZMQRejectedProduceBytes
        expr: rate(kafka_server_brokertopicmetrics_bytesrejected_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ZMQ broker topic metrics report rejected produce bytes.
          description: Rejected write payloads can indicate oversized batches, invalid acks, fencing, or storage failures.

      - alert: ZMQHighJmxRequestLocalTime
        expr: sum(rate(kafka_network_requestmetrics_localtimems_total[5m])) / clamp_min(sum(rate(kafka_network_requestmetrics_requests_total[5m])), 1) > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ JMX-compatible local request time is above 1 second.
          description: Broker-local request handling time is sustained above the operational latency SLO.

      - alert: ZMQJmxRequestErrors
        expr: sum(rate(kafka_network_requestmetrics_errors_total{error!="NONE"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ZMQ JMX-compatible request metrics report errors.
          description: RequestMetrics ErrorsPerSec should stay at zero for steady-state broker traffic.

  - name: zmq-storage
    rules:
      - alert: ZMQS3RequestErrors
        expr: sum(rate(s3_request_errors_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ZMQ S3 requests are failing.
          description: S3 request errors can block WAL/object durability and stateless recovery.

      - alert: ZMQS3LatencyP99
        expr: histogram_quantile(0.99, sum(rate(s3_request_duration_seconds_bucket[5m])) by (le, operation)) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ S3 request p99 latency is above 2 seconds.
          description: High object-store latency can increase produce/fetch tail latency and recovery time.

      - alert: ZMQCompactionErrors
        expr: rate(compaction_errors_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ZMQ compaction is reporting errors.
          description: Compaction failures can leave orphaned objects or delay cleanup.

  - name: zmq-client-telemetry
    rules:
      - alert: ZMQClientTelemetryRetainedBytesHigh
        expr: kafka_client_telemetry_bytes > 104857600
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: ZMQ retained client telemetry exceeds 100 MiB.
          description: Client telemetry retention may be growing without terminating cleanup.

      - alert: ZMQClientTelemetryExportErrors
        expr: rate(kafka_client_telemetry_export_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ZMQ client telemetry export is failing.
          description: Accepted client telemetry cannot be delivered to the configured external sink.
