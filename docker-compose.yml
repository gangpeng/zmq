# ZMQ — 3-Node Cluster with MinIO S3
#
# Each node runs in combined mode (controller + broker) with dual ports:
#   - Controller port (9093 internal): KRaft consensus, voter RPCs
#   - Broker port (9092 internal): Kafka client APIs (produce/fetch/etc.)
#
# Usage:
#   docker compose up -d              # Start 3-node cluster + MinIO
#   docker compose logs -f            # View logs
#   python3 tests/e2e_test.py         # Run E2E tests
#   python3 benchmarks/benchmark_compare.py  # Run benchmarks
#   docker compose down -v            # Stop and clean up
#
# External ports:
#   MinIO S3:       9000 (API), 9001 (Console UI)
#   Node 0:         19092 (broker), 19093 (controller), 19090 (metrics)
#   Node 1:         19094 (broker), 19095 (controller), 19091 (metrics)
#   Node 2:         19096 (broker), 19097 (controller), 19098 (metrics)

services:
  minio:
    image: minio/minio:latest
    container_name: zmq-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/automq --ignore-existing;
      echo 'Bucket automq created';
      "

  node0:
    build: .
    container_name: zmq-node-0
    ports:
      - "19092:9092"
      - "19093:9093"
      - "19090:9090"
    command: >
      --node-id 0
      --process-roles controller,broker
      --port 9092
      --controller-port 9093
      --data-dir /data/zmq
      --s3-endpoint minio
      --s3-port 9000
      --s3-bucket automq
      --metrics-port 9090
      --cluster-id zmq-cluster
      --voters 0@node0:9093,1@node1:9093,2@node2:9093
      --advertised-host node0
    volumes:
      - node0-data:/data/zmq
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/health || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  node1:
    build: .
    container_name: zmq-node-1
    ports:
      - "19094:9092"
      - "19095:9093"
      - "19091:9090"
    command: >
      --node-id 1
      --process-roles controller,broker
      --port 9092
      --controller-port 9093
      --data-dir /data/zmq
      --s3-endpoint minio
      --s3-port 9000
      --s3-bucket automq
      --metrics-port 9090
      --cluster-id zmq-cluster
      --voters 0@node0:9093,1@node1:9093,2@node2:9093
      --advertised-host node1
    volumes:
      - node1-data:/data/zmq
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/health || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  node2:
    build: .
    container_name: zmq-node-2
    ports:
      - "19096:9092"
      - "19097:9093"
      - "19098:9090"
    command: >
      --node-id 2
      --process-roles controller,broker
      --port 9092
      --controller-port 9093
      --data-dir /data/zmq
      --s3-endpoint minio
      --s3-port 9000
      --s3-bucket automq
      --metrics-port 9090
      --cluster-id zmq-cluster
      --voters 0@node0:9093,1@node1:9093,2@node2:9093
      --advertised-host node2
    volumes:
      - node2-data:/data/zmq
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/health || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  minio-data:
  node0-data:
  node1-data:
  node2-data:
