# ZMQ Broker Configuration
# This file uses Kafka-style properties format (key=value)
# CLI flags override values in this file.

# Broker identity
broker.id=0
cluster.id=automq-cluster

# Network listeners
listeners.port=9092
metrics.port=9090
advertised.host=localhost

# Log/data directories
log.dirs=/data/automq

# S3 storage backend (MinIO or AWS S3)
s3.endpoint.host=127.0.0.1
s3.endpoint.port=9000
s3.bucket=automq
s3.access.key=minioadmin
s3.secret.key=minioadmin

# Topic defaults
num.partitions=3
auto.create.topics.enable=false
default.replication.factor=1
min.insync.replicas=1

# Log retention
log.retention.hours=168
log.retention.bytes=-1
log.segment.bytes=1073741824
log.cleanup.policy=delete

# WAL configuration
wal.flush.interval.ms=1000
wal.segment.bytes=67108864

# S3 upload pipeline
s3.flush.records=100
s3.flush.interval.ms=30000

# Consumer group settings
group.session.timeout.ms=30000
group.heartbeat.interval.ms=3000

# Quotas
quota.producer.bytes.per.sec=104857600
quota.consumer.bytes.per.sec=209715200

# KRaft consensus
# Format: id@host:port,id@host:port,...
# Leave empty for single-node mode (auto-promotes to leader)
# controller.quorum.voters=0@localhost:9092,1@localhost:9093,2@localhost:9094

# Security (SASL)
# sasl.enabled.mechanisms=PLAIN,SCRAM-SHA-256
# security.protocol=SASL_PLAINTEXT

# TLS/SSL
# ssl.keystore.location=/path/to/keystore.jks
# ssl.keystore.password=changeit
# ssl.truststore.location=/path/to/truststore.jks
# ssl.truststore.password=changeit
